name: Release

# Publishes @hanfani/core to npm when you push a version tag, e.g.:
#   git tag v0.1.2 && git push origin v0.1.2
#
# Prerequisite (one-time):
#   - Repo secret NPM_TOKEN = an npm "Automation" access token with publish
#     rights to the @hanfani scope (Automation tokens bypass 2FA, required in CI).
#     Create at npmjs.com → Access Tokens → Generate New Token → Automation.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (verified "built on GitHub Actions" badge)

jobs:
  release:
    name: Publish @hanfani/core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4 # reads packageManager from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: pnpm install

      - name: Guard — tag must match package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag v${{ steps.version.outputs.version }} != package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Publish to npm (public, with provenance)
        run: |
          # strip any stray whitespace/newline from the secret (illegal in an HTTP header)
          TOKEN="$(printf '%s' "$NODE_AUTH_TOKEN" | tr -d '[:space:]')"
          if [ -z "$TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set — add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          {
            echo "registry=https://registry.npmjs.org/"
            echo "//registry.npmjs.org/:_authToken=$TOKEN"
          } > ~/.npmrc
          pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Release

# Publishes @hanfani/core to npm when you push a matching version tag, e.g.:
#   git tag core-v0.1.2 && git push origin core-v0.1.2
#
# Prerequisites (one-time):
#   - Repo secret NPM_TOKEN = an npm "Automation" access token with publish
#     rights to the @hanfani scope (Automation tokens bypass 2FA, required in CI).
#     Create at npmjs.com → Access Tokens → Generate New Token → Automation.

on:
  push:
    tags:
      - 'core-v*'

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (verified "built on GitHub Actions" badge)

jobs:
  release-core:
    name: Publish @hanfani/core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#core-v}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4 # reads packageManager from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Guard — tag must match package.json version
        run: |
          PKG_VERSION=$(node -p "require('./packages/core/package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag core-v${{ steps.version.outputs.version }} != packages/core/package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: pnpm --filter @hanfani/core typecheck

      - name: Test
        run: pnpm --filter @hanfani/core test

      - name: Build
        run: pnpm --filter @hanfani/core build

      - name: Publish to npm (public, with provenance)
        run: pnpm --filter @hanfani/core publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
